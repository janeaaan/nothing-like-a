<!DOCTYPE html>
<html lang="zh">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>你更像 Loeb 还是 Leopold？</title>
<meta name="description" content="12道题测出你的隐性人格倾向">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  /* 🔹结果页整体更紧凑 */
.result-card {
  padding:16px;               /* 原来20px → 更紧凑 */
  border-radius:16px;
  background:#111;
}

/* 🔹统一压缩所有文字间距 */
.result-card h1,
.result-card h2,
.result-card h3,
.result-card p {
  margin-top:4px;
  margin-bottom:4px;
  line-height:1.3;
}

/* 🔹标题大小微调 */
.result-card h1 {
  font-size:22px;
  font-weight:bold;
}

.result-card h2 {
  font-size:16px;
  opacity:0.9;
}

.result-card h3 {
  font-size:15px;
  opacity:0.85;
}

/* 🔹正文更紧凑 */
.result-card p {
  font-size:14px;
  opacity:0.75;
}

/* 🔹图片间距优化 */
.result-card img {
  width:100%;
  border-radius:12px;
  margin-bottom:10px;  /* 原来15px → 更紧凑 */
}

/* 🔹按钮间距稍微压缩 */
.result-card button {
  margin-top:8px;
  padding:14px;
  font-size:14px;
}
body {
  font-family: Arial;
  background: linear-gradient(135deg,#000000,#000000,#000000);
  color:#fff;
  text-align:center;
  padding:12px;
}
.container {
  max-width:650px;
  margin:auto;
  width:100%;
}
.card {
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
button {
  display:block;
  width:100%;
  margin:10px 0;
  padding: 16px;
  border:none;
  border-radius:12px;
  font-size:15px;
  cursor:pointer;
  background:rgba(255,255,255,0.15);
  color:#fff;
}
button:hover { background:rgba(255,255,255,0.3); }
.selected { background:#3b73ff !important; }
.progress-bar {height:8px;background:#444;border-radius:10px;margin-bottom:20px;}
.progress {height:8px;background:#327bea;border-radius:10px;width:0%;}
.result-card {padding:20px;border-radius:20px;background:#111;}
</style>
</head>
<body>
<div class="container">
<h1>LnL测试</h1>
<div class="progress-bar"><div id="bar" class="progress"></div></div>
<div id="qProgress" style="margin-bottom:10px;opacity:0.8;"></div>
<div id="quiz" class="card"></div>
<button id="prevBtn" onclick="prevQuestion()" style="display:none;">上一题</button>
</div>

<script>
const questions=[
{q:"在一段空闲时间里，你更可能？",options:[
{text:"沉浸在复杂的书或理论中",type:"NTLP",weight:2},
{text:"计划一些不寻常的事情",type:"RCLB",weight:2},
{text:"随意放松或打发时间",type:"NTLP",weight:1}
]},
{q:"面对一条规则时，你通常会？",options:[
{text:"思考它背后的逻辑",type:"NTLP",weight:2},
{text:"考虑是否有例外或漏洞",type:"RCLB",weight:2},
{text:"大致遵守，不太多想",type:"NTLP",weight:1}
]},
{q:"当你对某件事产生兴趣时？",options:[
{text:"深入研究细节，钻研透彻",type:"NTLP",weight:2},
{text:"尝试亲自体验，立马去做",type:"RCLB",weight:2},
{text:"保持浅层了解，不过多接触",type:"NTLP",weight:1}
]},
{q:"当面对一个复杂、甚至带有某种“越界意味”的问题时，你更可能？",options:[
{text:"先在脑中反复推演各种可能性，直到逻辑成立",type:"NTLP",weight:2},
{text:"更倾向直接进入行动，随机应变",type:"RCLB",weight:2},
{text:"依赖过往经验，用熟悉的方法去处理",type:"NTLP",weight:1}
]},
{q:"你更容易被什么吸引？",options:[
{text:"抽象概念、系统性知识或结构",type:"NTLP",weight:2},
{text:"刺激或具有挑战的事物",type:"RCLB",weight:2},
{text:"轻松有趣的事物",type:"NTLP",weight:0.5}
]},
{q:"在群体中，你更像？",options:[
{text:"提供思路与观点的人",type:"NTLP",weight:2},
{text:"推动行动与执行的人",type:"RCLB",weight:2},
{text:"配合参与、保持融入的人",type:"NTLP",weight:1}
]},
{q:"在一次关于“规则与例外”的长时间讨论中，你更容易？",options:[
{text:"沉浸在抽象概念里，试图构建一套自洽的解释",type:"NTLP",weight:2},
{text:"更关注现实中的运用，甚至思考如何打破它",type:"RCLB",weight:2},
{text:"觉得讨论有些过于复杂，更倾向于接受现状",type:"RCLB",weight:0.5}
]},
{q:"你更倾向于哪种学习方式？",options:[
{text:"通过系统性阅读构建完整知识框架",type:"NTLP",weight:2},
{text:"通过动手实践和尝试来学习",type:"RCLB",weight:2},
{text:"以零散方式获取信息，随用随学",type:"NTLP",weight:0.5}
]},
{q:"别人可能觉得你？",options:[
{text:"理性且冷静，会先观察再判断",type:"NTLP",weight:2},
{text:"表达直接，不太绕弯子",type:"RCLB",weight:2},
{text:"不太显眼，习惯顺其自然",type:"NTLP",weight:0.5}
]},
{q:"面对挑战时？",options:[
{text:"先把问题拆解清楚，再决定怎么做",type:"NTLP",weight:2},
{text:"边做边调整，不太会等准备完全",type:"RCLB",weight:2},
{text:"倾向用过去的经验直接应对",type:"NTLP",weight:1}
]},
{q:"压力出现时？",options:[
{text:"冷静思考并制定对策",type:"NTLP",weight:2},
{text:"迅速行动，先解决问题",type:"RCLB",weight:2},
{text:"暂时拖延或选择回避",type:"RCLB",weight:0.5}
]},
{q:"你更认同哪种说法？",options:[
 { text:"理解事物的本质更重要",type:"NTLP",weight:2},
 { text:"最终结果比过程更关键",type:"RCLB",weight:2},
 { text:"过程顺利比深究原因更重要",type:"RCLB",weight:1}
]}
];

let qs=[];
let current=0;
let answers=[];

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function showCover(){
  document.getElementById("quiz").innerHTML=`
    <div class="result-card">
      <h1>测测你是萝卜还是刘波</h1>
      <h2>（到底在测什么...）</h2>
      <p>总共12道题</p>
      <button onclick="startTest()">开始测试</button>
    </div>
  `;
  document.getElementById("prevBtn").style.display="none";
  document.getElementById("bar").style.width="0%";
}

function startTest(){
  qs=shuffle([...questions]);
  current=0;
  answers=new Array(qs.length);
  showQuestion();
}

function showQuestion(){
  let q=qs[current];
  if(!q.opts) q.opts=shuffle([...q.options]);

  let html=`<h2>${q.q}</h2>`;
  q.opts.forEach((opt,i)=>{
    let sel=answers[current]===i?"selected":"";
    html+=`<button class="${sel}" onclick="answer(${i})">${opt.text}</button>`;
  });

  document.getElementById("quiz").innerHTML=html;
  document.getElementById("prevBtn").style.display=current>0?"block":"none";
  document.getElementById("bar").style.width=((current)/qs.length*100)+"%";
    document.getElementById("qProgress").innerText=`第 ${current+1} / ${qs.length} 题`;
}

function answer(i){answers[current]=i;current++;if(current<qs.length)showQuestion();else showResult();}
function prevQuestion(){current--;showQuestion();}

function showResult(){
  let ntlp=0,rclb=0;

answers.forEach((a,i)=>{
  let opt = qs[i].opts[a];
  let w = opt?.weight || 1;

  if(opt.type === "NTLP") ntlp += w;
  if(opt.type === "RCLB") rclb += w;
});
  let isNTLP=ntlp>=rclb;
  let total = ntlp + rclb;

let percent = total === 0
  ? 0
  : Math.round((Math.max(ntlp, rclb) / total) * 100);
   let title=isNTLP?"NTLP":"RCLB";

  let desc=isNTLP?"理性、沉浸思考、倾向构建自己的思想世界":"行动、掌控、追求刺激与现实影响力";
  document.getElementById("quiz").innerHTML=`
   <div id="resultImage" class="result-card">

${isNTLP
  ? `<img src="ntlp.jpg" style="width:100%;border-radius:15px;margin-bottom:5px;">`
  : `<img src="rclb.jpg" style="width:100%;border-radius:15px;margin-bottom:5px;">`
}

<h2>测试结果</h2>
      <h1>${title}</h1>
<p style="opacity:0.7; margin-top:4px;">
  ${isNTLP ? "你是Nathan Leopold" : "你是Richard Loeb"}
</p>
      <h3>${percent}% 匹配</h3>
      <p>${desc}</p>
      <button onclick="shareImage()">生成分享图</button>
      <button onclick="location.reload()">重新测试</button>
    </div>
  `;

  document.getElementById("bar").style.width="100%";
  document.getElementById("prevBtn").style.display="none";
}

function shareImage(){
  html2canvas(document.getElementById("resultImage")).then(canvas=>{
    let a=document.createElement("a");
    a.download="result.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

showCover();
</script>
</body>
</html>
